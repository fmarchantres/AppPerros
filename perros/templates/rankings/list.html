{% extends "base.html" %}

{% block content %}
<div class="container mt-4">

    <h2>Mis Rankings</h2>

    <a href="{% url 'create_ranking' %}" class="btn btn-primary mb-3">
        + Nuevo Ranking
    </a>

    <ul class="list-group">
        {% for r in rankings %}
            <li class="list-group-item d-flex justify-content-between align-items-center">

                <div>
                    <strong>{{ r.name }}</strong><br>
                    <small class="text-muted">
                        {{ r.total_dogs }} elementos
                    </small>
                </div>

                <div class="d-flex gap-2">

                    <a href="{% url 'ranking_detail' r.id %}"
                       class="btn btn-sm btn-primary">
                        Ver
                    </a>

                    <a href="{% url 'editar_ranking' r.id %}"
                       class="btn btn-sm btn-outline-secondary">
                        Editar
                    </a>

                    <form method="POST"
                          action="{% url 'delete_ranking' r.id %}"
                          style="display:inline;">
                        {% csrf_token %}
                        <button class="btn btn-sm btn-outline-danger">
                            Eliminar
                        </button>
                    </form>

                </div>

            </li>
        {% empty %}
            <li class="list-group-item">
                No tienes rankings todavía.
            </li>
        {% endfor %}
    </ul>

</div>
{% endblock %}
