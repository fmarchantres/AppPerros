{% extends "base.html" %}

{% block title %}Crear Ranking{% endblock %}

{% block content %}

<div class="container py-5">

    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">

            <div class="card shadow-sm border-0">
                <div class="card-body p-4">

                    <h3 class="mb-4 fw-bold text-center">
                         Crear nuevo ranking
                    </h3>

                    <form method="post">
                        {% csrf_token %}

                        <!-- NOMBRE -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">
                                Nombre del ranking
                            </label>
                            <input type="text"
                                   name="name"
                                   class="form-control"
                                   placeholder="Ej: Mis perros favoritos"
                                   required>
                        </div>

                        <!-- CATEGORÍA -->
                        <div class="mb-4">
                            <label class="form-label fw-semibold">
                                Categoría (opcional)
                            </label>
                            <select name="category_slug" class="form-select">
                                <option value="">Libre (sin categoría)</option>

                                {% for c in categorias %}
                                    <option value="{{ c.slug }}">
                                        {{ c.name }}
                                    </option>
                                {% endfor %}
                            </select>

                            <small class="text-muted">
                                Si eliges categoría, el ranking quedará asociado a ella.
                            </small>
                        </div>

                        <!-- BOTÓN ORIGINAL -->
                        <div class="d-grid">
                            <button class="btn btn-success">
                                Crear
                            </button>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>

</div>

{% endblock %}
