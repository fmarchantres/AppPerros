{% extends "base.html" %}

{% block title %}Crear Ranking{% endblock %}

{% block content %}

<div class="container py-5">

    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">

            <div class="card shadow-sm border-0">
                <div class="card-body p-4">

                    <h3 class="mb-4 fw-bold text-center">
                         Crear nuevo ranking
                    </h3>

                    <form method="post">
                        {% csrf_token %}

                        <!-- NOMBRE -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">
                                Nombre del ranking
                            </label>
                            <input type="text"
                                   name="name"
                                   class="form-control"
                                   placeholder="Ej: Mis perros favoritos"
                                   required>
                        </div>

                        <!-- CATEGORÍA -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">
                                Categoría (opcional)
                            </label>
                            <select name="category_slug"
                                    id="category-select"
                                    class="form-select"
                                    onchange="updateValues()">
                                <option value="">Libre (sin categoría)</option>

                                {% for c in categorias %}
                                    <option value="{{ c.slug }}">
                                        {{ c.name }}
                                    </option>
                                {% endfor %}
                            </select>

                            <small class="text-muted">
                                Si eliges categoría, podrás elegir un valor concreto.
                            </small>
                        </div>

                        <!-- NUEVO: VALOR DE CATEGORÍA -->
                        <div class="mb-4" id="value-container" style="display:none;">
                            <label class="form-label fw-semibold">
                                Valor de la categoría
                            </label>
                            <select name="category_value"
                                    id="value-select"
                                    class="form-select">
                                <option value="">Selecciona un valor</option>
                            </select>
                        </div>

                        <!-- BOTÓN ORIGINAL -->
                        <div class="d-grid">
                            <button class="btn btn-success">
                                Crear
                            </button>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>

</div>

<!-- SCRIPT PARA CARGAR VALORES DINÁMICAMENTE -->
<script>
    const valoresPorCategoria = {{ valores_por_categoria|safe }};

    function updateValues() {
        const categorySelect = document.getElementById("category-select");
        const valueContainer = document.getElementById("value-container");
        const valueSelect = document.getElementById("value-select");

        const selected = categorySelect.value;

        valueSelect.innerHTML = '<option value="">Selecciona un valor</option>';

        if (!selected || !valoresPorCategoria[selected]) {
            valueContainer.style.display = "none";
            return;
        }

        valoresPorCategoria[selected].forEach(function(value) {
            const option = document.createElement("option");
            option.value = value;
            option.textContent = value;
            valueSelect.appendChild(option);
        });

        valueContainer.style.display = "block";
    }
</script>

{% endblock %}
